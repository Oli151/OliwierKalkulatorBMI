<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator BMI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.3s;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 300px;
            transition: 0.3s;
        }

        h1 {
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        .gender {
            margin-top: 10px;
        }

        .toggle {
            margin-top: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
        }

        /* 🌙 TRYB NOCNY */
        .dark-mode {
            background: #1e1e1e;
            color: #fff;
        }

        .dark-mode .container {
            background: #2c2c2c;
        }

        .dark-mode input {
            background: #444;
            color: white;
            border: 1px solid #666;
        }

        .dark-mode button {
            background: #28a745;
        }

        .dark-mode button:hover {
            background: #1e7e34;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkulator BMI</h1>

    <label>Waga (kg):</label>
    <input type="number" id="weight" placeholder="np. 70">

    <label>Wzrost (cm):</label>
    <input type="number" id="height" placeholder="np. 175">

    <div class="gender">
        <label><input type="radio" name="gender" value="male"> Mężczyzna</label><br>
        <label><input type="radio" name="gender" value="female"> Kobieta</label>
    </div>

    <button onclick="calculateBMI()">Oblicz BMI</button>

    <div class="result" id="result"></div>

    <div class="toggle" onclick="toggleDarkMode()">
        🌙 Przełącz tryb nocny
    </div>
</div>

<script>
function calculateBMI() {
    const weight = document.getElementById('weight').value;
    const height = document.getElementById('height').value / 100;
    const gender = document.querySelector('input[name="gender"]:checked');

    if (!weight || !height || !gender) {
        document.getElementById('result').innerText = "Wpisz wszystkie dane!";
        return;
    }

    const bmi = (weight / (height * height)).toFixed(2);
    let category = "";

    if (bmi < 18.5) {
        category = "Niedowaga";
    } else if (bmi < 25) {
        category = "Waga prawidłowa";
    } else if (bmi < 30) {
        category = "Nadwaga";
    } else {
        category = "Otyłość";
    }

    document.getElementById('result').innerText = 
        `Płeć: ${gender.value === 'male' ? 'Mężczyzna' : 'Kobieta'} | BMI: ${bmi} (${category})`;
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
